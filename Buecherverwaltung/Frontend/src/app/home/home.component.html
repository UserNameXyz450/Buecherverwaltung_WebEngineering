<ng-container *ngIf="isLoggedIn$ | async">
  <!-- KI-generiert -->
  <h1 *ngIf="currentUser$ | async as user">Hello, {{ user?.username }}!</h1>
</ng-container>

<h1> BOOKS </h1>

<div id="topic-search">
  <label>Search for a topic:</label>
  <div id="search-field">
    <input type="text" id="topic" name="q" #topic/>
    <!---<pre id="log" #log></pre>-->
    <button (click)="main()">Search</button>
  </div>
</div>

<div id="book-entries"></div>
